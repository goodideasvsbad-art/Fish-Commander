# HIPPOCAMPUS API — CodeFish Memory Injection Endpoint
# Add this block to /etc/nginx/sites-enabled/fishbrain
# Insert BEFORE the general /api/ location block (line ~258)
#
# Purpose: Exposes mem0 /query to Claude Code hooks so CodeFish
# gets hippocampus memories auto-injected before responding.
# Protected by API key header + rate limiting.

    # Hippocampus recall endpoint for CodeFish hooks
    location /api/hippocampus/recall {
        # API key authentication — reject if missing or wrong
        set $hippo_auth_ok 0;
        if ($http_x_hippo_key = "REPLACE_WITH_GENERATED_KEY") {
            set $hippo_auth_ok 1;
        }
        if ($hippo_auth_ok = 0) {
            return 403;
        }

        # Rate limit — 30 req/min should be plenty for hook calls
        limit_req zone=api burst=10 nodelay;

        # Only allow POST
        limit_except POST {
            deny all;
        }

        proxy_pass http://127.0.0.1:5060/query;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Content-Type "application/json";
        proxy_read_timeout 10s;
        proxy_connect_timeout 3s;
    }

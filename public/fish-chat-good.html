    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ============================================
        // ERROR BOUNDARY
        // ============================================
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null, errorInfo: null };
            }

            static getDerivedStateFromError(error) {
                return { hasError: true };
            }

            componentDidCatch(error, errorInfo) {
                console.error('React Error:', error, errorInfo);
                this.setState({ error, errorInfo });
            }

            render() {
                if (this.state.hasError) {
                    return (
                        <div className="h-full flex items-center justify-center p-4 bg-slate-900">
                            <div className="glass-strong rounded-2xl p-8 max-w-2xl">
                                <div className="text-6xl mb-4 text-center">💥</div>
                                <h1 className="text-2xl font-bold text-white mb-4 text-center">
                                    Fish crashed!
                                </h1>
                                <p className="text-slate-300 mb-4">
                                    Something went wrong. Try refreshing the page.
                                </p>
                                <details className="text-xs text-slate-400 mb-4">
                                    <summary className="cursor-pointer">Error details</summary>
                                    <pre className="mt-2 p-2 bg-slate-800 rounded overflow-auto">
                                        {this.state.error && this.state.error.toString()}
                                    </pre>
                                </details>
                                <button
                                    onClick={() => window.location.reload()}
                                    className="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-3 rounded-lg transition-all"
                                >
                                    Reload Fish
                                </button>
                            </div>
                        </div>
                    );
                }

                return this.props.children;
            }
        }

        // ============================================
        // CONFIGURATION
        // ============================================
        const PROFILES = {
            meatbrain: {
                name: 'Andy',
                description: 'Full chaos mode - all features',
                emoji: '🐟',
                showVoice: true,
                showQuickActions: true,
                responseStyle: 'default',
                micSize: 'normal'
            },
            accounts: {
                name: 'Sharon',
                description: 'Type mode - detailed responses',
                emoji: '📊',
                showVoice: false,
                showQuickActions: false,
                responseStyle: 'detailed',
                micSize: 'normal'
            },
            vanguy: {
                name: 'Steve',
                description: 'Voice mode - short answers',
                emoji: '🚚',
                showVoice: true,
                showQuickActions: false,
                responseStyle: 'short',
                micSize: 'large'
            }
        };

        const WORKER_URL = 'https://fish-api.buildyourfish.workers.dev';
        const FISHBRAIN_URL = 'https://fishbrain.meatbag.com.au';
        const FISHBRAIN_TOKEN = 'fish_d48aa0f949a6153f144cd6f560d08aa03d3e1e8b_2025';
        
        const TOKEN_ESTIMATES = {
            // Rough estimates: ~4 chars per token
            charToToken: 4,
            // Model costs per million tokens (input / output)
            costs: {
                'claude-sonnet-4-20250514': { input: 3, output: 15 },
                'claude-opus-4-20250514': { input: 15, output: 75 }
            }
        };
        
        // ============================================
        // UTILITIES
        // ============================================
        
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }
        
        function estimateTokens(text) {
            return Math.ceil(text.length / TOKEN_ESTIMATES.charToToken);
        }
        
        function calculateCost(inputTokens, outputTokens, model) {
            const costs = TOKEN_ESTIMATES.costs[model] || TOKEN_ESTIMATES.costs['claude-sonnet-4-20250514'];
            const inputCost = (inputTokens / 1000000) * costs.input;
            const outputCost = (outputTokens / 1000000) * costs.output;
            return (inputCost + outputCost).toFixed(4);
        }

        // ============================================
        // LOCK SCREEN COMPONENT
        // ============================================
        
        function LockScreen({ onUnlock }) {
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleUnlock = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');

                // Check which profile the password matches
                let matchedProfile = null;
                for (const [key, profile] of Object.entries(PROFILES)) {
                    const profileHash = await hashPassword(key);
                    const inputHash = await hashPassword(password);

                    if (inputHash === profileHash) {
                        matchedProfile = { ...profile, key };
                        break;
                    }
                }

                if (matchedProfile) {
                    localStorage.setItem('fish_unlock', await hashPassword(matchedProfile.key));
                    localStorage.setItem('fish_profile', matchedProfile.key);
                    onUnlock(matchedProfile);
                } else {
                    setError('Wrong password mate 🐟');
                    setPassword('');
                }

                setLoading(false);
            };
            
            return (
                <div className="h-full flex items-center justify-center p-4 bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900">
                    <div className="absolute inset-0 overflow-hidden pointer-events-none">
                        <div className="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-500/10 rounded-full blur-3xl"></div>
                        <div className="absolute bottom-1/4 right-1/4 w-96 h-96 bg-cyan-500/10 rounded-full blur-3xl"></div>
                    </div>
                    
                    <div className="glass-strong rounded-2xl p-8 w-full max-w-md shadow-2xl animate-slide-up relative z-10">
                        <div className="text-center mb-8">
                            <div className="text-7xl mb-4 float-animation">🐟</div>
                            <h1 className="text-3xl font-bold text-white mb-2">Fish Chat</h1>
                            <p className="text-slate-400">Your escape from throttled Claude</p>
                        </div>
                        
                        <form onSubmit={handleUnlock} className="space-y-4">
                            <input
                                type="password"
                                value={password}
                                onChange={(e) => setPassword(e.target.value)}
                                placeholder="Enter password"
                                className="w-full px-4 py-3 bg-slate-900/50 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                                autoFocus
                            />
                            
                            {error && (
                                <div className="text-red-400 text-sm text-center animate-fade-in">
                                    {error}
                                </div>
                            )}
                            
                            <button
                                type="submit"
                                disabled={loading || !password}
                                className="w-full bg-gradient-to-r from-blue-500 to-blue-600 text-white font-semibold py-3 rounded-lg hover:from-blue-600 hover:to-blue-700 transition-all transform hover:scale-[1.02] active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed shadow-lg"
                            >
                                {loading ? 'Unlocking...' : 'Unlock'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        }
        
        // ============================================
        // CODE BLOCK COMPONENT
        // ============================================

        function CodeBlock({ code, language, isDarkMode }) {
            const [copied, setCopied] = useState(false);
            const codeRef = useRef(null);

            useEffect(() => {
                if (codeRef.current && window.hljs) {
                    window.hljs.highlightElement(codeRef.current);
                }
            }, [code]);

            const handleCopy = async () => {
                try {
                    await navigator.clipboard.writeText(code);
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                } catch (err) {
                    console.error('Failed to copy code:', err);
                }
            };

            return (
                <div className={`relative my-3 rounded-lg overflow-hidden ${isDarkMode ? 'bg-slate-900' : 'bg-slate-100'}`}>
                    <div className={`flex items-center justify-between px-4 py-2 ${isDarkMode ? 'bg-slate-800 border-b border-slate-700' : 'bg-slate-200 border-b border-slate-300'}`}>
                        <span className={`text-xs font-mono ${isDarkMode ? 'text-slate-400' : 'text-slate-600'}`}>
                            {language || 'code'}
                        </span>
                        <button
                            onClick={handleCopy}
                            className={`text-xs px-2 py-1 rounded ${
                                copied
                                    ? 'bg-green-500 text-white'
                                    : `${isDarkMode ? 'bg-slate-700 hover:bg-slate-600 text-slate-300' : 'bg-white hover:bg-slate-50 text-slate-700'}`
                            } transition-all`}
                        >
                            {copied ? '✓ Copied' : '📋 Copy'}
                        </button>
                    </div>
                    <pre className="p-4 overflow-x-auto">
                        <code ref={codeRef} className={`language-${language || 'plaintext'} text-sm`}>
                            {code}
                        </code>
                    </pre>
                </div>
            );
        }

        // ============================================
        // MESSAGE COMPONENT
        // ============================================

        function Message({ role, content, isStreaming, isDarkMode = true, timestamp, messageId, isEditing, onEdit, onSaveEdit, onCancelEdit, editedContent, onEditedContentChange, onRegenerate }) {
            const [copied, setCopied] = useState(false);

            // Parse markdown code blocks and images
            const parseContent = (text) => {
                const codeBlockRegex = /```(\w+)?\n([\s\S]*?)```/g;
                const imageUrlRegex = /(https?:\/\/[^\s]+\.(?:jpg|jpeg|png|gif|webp|svg))/gi;
                const parts = [];
                let lastIndex = 0;
                let match;

                // First, extract code blocks
                const codeMatches = [];
                while ((match = codeBlockRegex.exec(text)) !== null) {
                    codeMatches.push({
                        start: match.index,
                        end: match.index + match[0].length,
                        type: 'code',
                        language: match[1] || 'plaintext',
                        content: match[2].trim()
                    });
                }

                // Then, process text and find images
                let currentIndex = 0;
                for (const codeMatch of codeMatches) {
                    // Process text before code block
                    if (codeMatch.start > currentIndex) {
                        const textSegment = text.slice(currentIndex, codeMatch.start);
                        parseTextWithImages(textSegment, parts);
                    }
                    // Add code block
                    parts.push(codeMatch);
                    currentIndex = codeMatch.end;
                }

                // Process remaining text
                if (currentIndex < text.length) {
                    const textSegment = text.slice(currentIndex);
                    parseTextWithImages(textSegment, parts);
                }

                return parts.length > 0 ? parts : [{ type: 'text', content: text }];
            };

            const parseTextWithImages = (text, parts) => {
                const imageUrlRegex = /(https?:\/\/[^\s]+\.(?:jpg|jpeg|png|gif|webp|svg))/gi;
                let lastIndex = 0;
                let match;

                while ((match = imageUrlRegex.exec(text)) !== null) {
                    // Add text before image
                    if (match.index > lastIndex) {
                        parts.push({
                            type: 'text',
                            content: text.slice(lastIndex, match.index)
                        });
                    }
                    // Add image
                    parts.push({
                        type: 'image',
                        url: match[0]
                    });
                    lastIndex = match.index + match[0].length;
                }

                // Add remaining text
                if (lastIndex < text.length) {
                    parts.push({
                        type: 'text',
                        content: text.slice(lastIndex)
                    });
                }
            };

            const handleCopy = async () => {
                try {
                    await navigator.clipboard.writeText(content);
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                } catch (err) {
                    console.error('Failed to copy:', err);
                }
            };

            const formatTime = (ts) => {
                if (!ts) return '';
                const date = new Date(ts);
                return date.toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' });
            };

            if (role === 'system') {
                // Don't show system messages at all - they're just noise
                return null;
            }

            const isUser = role === 'user';
            const contentParts = parseContent(content);

            if (isEditing) {
                return (
                    <div className={`flex ${isUser ? 'justify-end' : 'justify-start'} mb-4 animate-slide-up`}>
                        <div className={`flex flex-col ${isUser ? 'items-end' : 'items-start'} gap-2 w-full max-w-[85%]`}>
                            <textarea
                                value={editedContent}
                                onChange={(e) => onEditedContentChange(e.target.value)}
                                className={`w-full px-4 py-3 rounded-xl ${isDarkMode ? 'bg-slate-900/50 border-slate-700 text-white' : 'bg-white border-slate-300 text-slate-900'} border focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none`}
                                rows={4}
                                autoFocus
                            />
                            <div className="flex gap-2">
                                <button
                                    onClick={() => onSaveEdit(messageId)}
                                    className="px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-lg text-sm font-semibold transition-all"
                                >
                                    ✓ Save & Resend
                                </button>
                                <button
                                    onClick={onCancelEdit}
                                    className={`px-4 py-2 ${isDarkMode ? 'bg-slate-700 hover:bg-slate-600' : 'bg-slate-200 hover:bg-slate-300'} ${isDarkMode ? 'text-white' : 'text-slate-900'} rounded-lg text-sm transition-all`}
                                >
                                    Cancel
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className={`flex ${isUser ? 'justify-end' : 'justify-start'} mb-4 animate-slide-up group`}>
                    <div className={`flex flex-col ${isUser ? 'items-end' : 'items-start'} gap-1`}>
                        <div
                            className={`max-w-[85%] px-4 py-3 rounded-2xl shadow-lg relative ${
                                isUser
                                    ? 'bg-gradient-to-r from-blue-500 to-blue-600 text-white rounded-br-md'
                                    : `${isDarkMode ? 'glass text-slate-100' : 'bg-white text-slate-900 border border-slate-200'} rounded-bl-md`
                            } ${isStreaming ? 'glow-animation' : ''}`}
                        >
                            <div className="leading-relaxed">
                                {contentParts.map((part, idx) => {
                                    if (part.type === 'code') {
                                        return (
                                            <CodeBlock
                                                key={idx}
                                                code={part.content}
                                                language={part.language}
                                                isDarkMode={isDarkMode}
                                            />
                                        );
                                    } else if (part.type === 'image') {
                                        return (
                                            <div key={idx} className="my-3">
                                                <img
                                                    src={part.url}
                                                    alt="Embedded image"
                                                    className="max-w-full rounded-lg shadow-lg"
                                                    loading="lazy"
                                                    onError={(e) => {
                                                        e.target.style.display = 'none';
                                                        e.target.nextSibling.style.display = 'block';
                                                    }}
                                                />
                                                <div style={{ display: 'none' }} className={`text-sm ${isDarkMode ? 'text-slate-400' : 'text-slate-600'}`}>
                                                    [Image failed to load: {part.url}]
                                                </div>
                                            </div>
                                        );
                                    } else {
                                        return (
                                            <div key={idx} className="whitespace-pre-wrap">
                                                {part.content}
                                            </div>
                                        );
                                    }
                                })}
                            </div>
                            {!isStreaming && (
                                <div className="absolute -top-2 -right-2 flex gap-1 opacity-0 group-hover:opacity-100 transition-all">
                                    <button
                                        onClick={handleCopy}
                                        title="Copy message"
                                        className={`w-8 h-8 rounded-full flex items-center justify-center text-sm shadow-lg ${
                                            copied
                                                ? 'bg-green-500 text-white'
                                                : `${isDarkMode ? 'bg-slate-700 hover:bg-slate-600 text-white' : 'bg-slate-200 hover:bg-slate-300 text-slate-700'}`
                                        }`}
                                    >
                                        {copied ? '✓' : '📋'}
                                    </button>
                                    {isUser && onEdit && (
                                        <button
                                            onClick={() => onEdit(messageId, content)}
                                            title="Edit message"
                                            className={`w-8 h-8 rounded-full flex items-center justify-center text-sm shadow-lg ${isDarkMode ? 'bg-slate-700 hover:bg-slate-600 text-white' : 'bg-slate-200 hover:bg-slate-300 text-slate-700'}`}
                                        >
                                            ✏️
                                        </button>
                                    )}
                                    {!isUser && onRegenerate && (
                                        <button
                                            onClick={() => onRegenerate(messageId)}
                                            title="Regenerate response"
                                            className={`w-8 h-8 rounded-full flex items-center justify-center text-sm shadow-lg ${isDarkMode ? 'bg-slate-700 hover:bg-slate-600 text-white' : 'bg-slate-200 hover:bg-slate-300 text-slate-700'}`}
                                        >
                                            🔄
                                        </button>
                                    )}
                                </div>
                            )}
                        </div>
                        {timestamp && !isStreaming && (
                            <div className={`text-xs ${isDarkMode ? 'text-slate-500' : 'text-slate-400'} px-2`}>
                                {formatTime(timestamp)}
                            </div>
                        )}
                    </div>
                </div>
            );
        }
        
        // ============================================
        // MAIN APP COMPONENT
        // ============================================
        
        function FishChatApp() {
            const [unlocked, setUnlocked] = useState(false);
            const [profile, setProfile] = useState(null);
            const [apiKey, setApiKey] = useState('');
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [status, setStatus] = useState('offline');
            const [model, setModel] = useState(localStorage.getItem('fish_model') || 'claude-sonnet-4-20250514');
            const [listening, setListening] = useState(false);
            const [connectionStatus, setConnectionStatus] = useState('disconnected'); // disconnected, connected, reconnecting
            const [totalTokens, setTotalTokens] = useState(0);
            const [lastResponseCost, setLastResponseCost] = useState(null);
            const [isDarkMode, setIsDarkMode] = useState(localStorage.getItem('fish_theme') !== 'light');
            const [currentSessionId, setCurrentSessionId] = useState(localStorage.getItem('fish_current_session') || 'default');
            const [sessions, setSessions] = useState({});
            const [showSessionMenu, setShowSessionMenu] = useState(false);
            const [lastBackupCount, setLastBackupCount] = useState(0);
            const [backupStatus, setBackupStatus] = useState(''); // 'backing-up', 'backed-up', ''
            const [ttsEnabled, setTtsEnabled] = useState(localStorage.getItem('fish_tts') === 'true');
            const [isSpeaking, setIsSpeaking] = useState(false);
            const [editingMessageId, setEditingMessageId] = useState(null);
            const [editedContent, setEditedContent] = useState('');
            const [calculationResult, setCalculationResult] = useState(null);
            const [sessionSearch, setSessionSearch] = useState('');

            const messagesEndRef = useRef(null);
            const recognitionRef = useRef(null);

                    while (true) {

                    ));

                if (!ttsEnabled || !window.speechSynthesis) return;

                // Stop any current speech

                // Remove markdown code blocks and excessive formatting for TTS
                let cleanText = text
                    .replace(/```[\s\S]*?```/g, ' [code block] ')
                    .replace(/`([^`]+)`/g, '$1')
                    .replace(/\*\*([^*]+)\*\*/g, '$1')
                    .replace(/\*([^*]+)\*/g, '$1')

                    const australianVoice = voices.find(v => v.lang.includes('en-AU'));

                        utterance.voice = australianVoice;

                        const lines = buffer.split('\n');
                        buffer = lines.pop() || '';

                        for (const line of lines) {
                            if (line.startsWith('data: ')) {
                                const data = line.slice(6);
                                if (data === '[DONE]') continue;

                                try {
                                    const parsed = JSON.parse(data);

                                    if (parsed.type === 'content_block_delta' &&
                                        parsed.delta?.type === 'text_delta') {
                                        fullText += parsed.delta.text;
                                        setMessages(prev => prev.map(m =>
                                            m.id === streamId
                                                ? { ...m, content: fullText + '▌' }
                                                : m
                                        ));
                                    }

                                    if (parsed.type === 'message_stop') {
                                        setMessages(prev => prev.map(m =>
                                            m.id === streamId
                                                ? { ...m, content: fullText }
                                                : m
                                        ));
                                    }
                                } catch (e) {
                                    // Ignore JSON parse errors
                                }
                            }
                        }
                    }

                    setMessages(prev => prev.map(m =>
                        m.id === streamId
                            ? { ...m, content: fullText || '(empty response)' }
                            : m
                    ));

                    if (fullText) {
                        speakText(fullText);
                    }

                    const outputTokens = estimateTokens(fullText);
                    const cost = calculateCost(inputTokens, outputTokens, model);
                    setLastResponseCost(cost);

                } catch (err) {
                    if (err.name === 'AbortError') {
                        setMessages(prev => prev.map(m =>
                            m.id === streamId
                                ? { ...m, content: fullText || '⏹️ Generation stopped' }
                                : m
                        ));
                    } else {
                        setMessages(prev => prev.map(m =>
                            m.id === streamId
                                ? { ...m, content: `❌ Error: ${err.message}` }
                                : m
                        ));
                        setStatus('error');
                        setConnectionStatus('disconnected');
                    }
                } finally {
                    setLoading(false);
                    streamingIdRef.current = null;
                    abortControllerRef.current = null;
                }
            };

            const detectCalculation = (text) => {
                // Basic math expression detection
                const mathRegex = /^[\d\s+\-*/().]+$/;
                const trimmed = text.trim();

                // Check if it looks like a math expression
                if (!trimmed || trimmed.length > 100 || !mathRegex.test(trimmed)) {
                    setCalculationResult(null);
                    return;
                }

                try {
                    // Safe eval using Function constructor (only for simple math)
                    const result = Function('"use strict"; return (' + trimmed + ')')();

                    if (typeof result === 'number' && isFinite(result)) {
                        setCalculationResult(result);
                    } else {
                        setCalculationResult(null);
                    }
                } catch (e) {
                    setCalculationResult(null);
                }
            };

            const handleInputChange = (value) => {
                setInput(value);
                detectCalculation(value);
            };
